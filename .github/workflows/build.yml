name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @tinyflow-ai/ui
        run: pnpm --filter @tinyflow-ai/ui build

      - name: Build @tinyflow-ai/vue
        run: pnpm --filter @tinyflow-ai/vue build

      - name: Build @tinyflow-ai/react
        run: pnpm --filter @tinyflow-ai/react build

      - name: Build @tinyflow-ai/svelte
        run: pnpm --filter @tinyflow-ai/svelte build

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist
          retention-days: 3
